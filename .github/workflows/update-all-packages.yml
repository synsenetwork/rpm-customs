name: Update All Packages

on:
  schedule:
    - cron: '0 12 * * *'  # Run daily at 12:00 UTC (24h format)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ============================================
      # Zed
      # ============================================
      - name: Check for new Zed prerelease
        id: check_zed
        run: |
          CURRENT_VERSION=$(grep -oP '^%global upstream_version\s+\K[0-9.]+' zed/zed.spec)
          CURRENT_PRERELEASE=$(grep -oP '^%global prerelease\s+\K\S+' zed/zed.spec)
          TAG_NAME=$(curl -fsSL https://api.github.com/repos/zed-industries/zed/releases | jq -r '[.[] | select(.prerelease == true)][0].tag_name')
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "Failed to determine latest Zed prerelease tag"
            exit 1
          fi
          LATEST_VERSION=$(echo "$TAG_NAME" | sed -E 's/^v([0-9.]+)-([A-Za-z0-9._-]+)$/\1/')
          LATEST_PRERELEASE=$(echo "$TAG_NAME" | sed -E 's/^v([0-9.]+)-([A-Za-z0-9._-]+)$/\2/')
          if [ "$LATEST_VERSION" = "$TAG_NAME" ] || [ "$LATEST_PRERELEASE" = "$TAG_NAME" ]; then
            echo "Unexpected Zed tag format: $TAG_NAME"
            exit 1
          fi
          echo "current=$CURRENT_VERSION-$CURRENT_PRERELEASE" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_VERSION-$LATEST_PRERELEASE" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "latest_prerelease=$LATEST_PRERELEASE" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ] || [ "$CURRENT_PRERELEASE" != "$LATEST_PRERELEASE" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Zed spec
        if: steps.check_zed.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.check_zed.outputs.latest_version }}"
          LATEST_PRERELEASE="${{ steps.check_zed.outputs.latest_prerelease }}"
          sed -i "s/^%global upstream_version .*/%global upstream_version $LATEST_VERSION/" zed/zed.spec
          sed -i "s/^%global prerelease\s\+.*/%global prerelease     $LATEST_PRERELEASE/" zed/zed.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - ${LATEST_VERSION}~${LATEST_PRERELEASE}-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to prerelease ${LATEST_VERSION}-${LATEST_PRERELEASE}" zed/zed.spec

      - name: Commit Zed changes
        if: steps.check_zed.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zed/zed.spec
          git commit -m "chore(zed): update to prerelease ${{ steps.check_zed.outputs.latest }}"

      # ============================================
      # JetBrains Toolbox
      # ============================================
      - name: Check for new JetBrains Toolbox version
        id: check_jetbrains_toolbox
        run: |
          CURRENT_VERSION=$(grep -oP '^Version:\s*\K[0-9.]+' jetbrains-toolbox/jetbrains-toolbox.spec)
          LATEST_VERSION=$(curl -fsSL 'https://data.services.jetbrains.com/products/releases?code=TBA&latest=true&type=release' | jq -r '.TBA[0].build')
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "Failed to determine latest JetBrains Toolbox version"
            exit 1
          fi
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update JetBrains Toolbox spec
        if: steps.check_jetbrains_toolbox.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.check_jetbrains_toolbox.outputs.latest }}"
          sed -i "s/^Version:\s*.*/Version:        $LATEST_VERSION/" jetbrains-toolbox/jetbrains-toolbox.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - $LATEST_VERSION-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to version $LATEST_VERSION" jetbrains-toolbox/jetbrains-toolbox.spec

      - name: Commit JetBrains Toolbox changes
        if: steps.check_jetbrains_toolbox.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jetbrains-toolbox/jetbrains-toolbox.spec
          git commit -m "chore(jetbrains-toolbox): update to version ${{ steps.check_jetbrains_toolbox.outputs.latest }}"

      # ============================================
      # Wootility Beta
      # ============================================
      - name: Check for new Wootility beta version
        id: check_wootility_beta
        run: |
          CURRENT_VERSION=$(grep -oP '^%global upstream_version\s+\K[0-9.]+' wootility-beta/wootility-beta.spec)
          CURRENT_PRERELEASE=$(grep -oP '^%global prerelease\s+\K\S+' wootility-beta/wootility-beta.spec)
          FILENAME=$(curl -sI 'https://api.wooting.io/public/wootility/download?os=linux&channel=beta' | tr -d '\r' | grep -iE '^location:' | grep -oP 'Wootility-\S+\.AppImage')
          if [ -z "$FILENAME" ]; then
            echo "Failed to determine latest Wootility beta filename"
            exit 1
          fi
          # Filename looks like Wootility-5.4.0-beta.0.AppImage; split semver from prerelease tag.
          STRIPPED=${FILENAME#Wootility-}
          STRIPPED=${STRIPPED%.AppImage}
          LATEST_VERSION=${STRIPPED%%-*}
          LATEST_PRERELEASE=${STRIPPED#*-}
          if [ "$LATEST_VERSION" = "$STRIPPED" ] || [ "$LATEST_PRERELEASE" = "$STRIPPED" ]; then
            echo "Unexpected Wootility beta filename: $FILENAME"
            exit 1
          fi
          echo "current=$CURRENT_VERSION-$CURRENT_PRERELEASE" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_VERSION-$LATEST_PRERELEASE" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "latest_prerelease=$LATEST_PRERELEASE" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ] || [ "$CURRENT_PRERELEASE" != "$LATEST_PRERELEASE" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Wootility beta spec
        if: steps.check_wootility_beta.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.check_wootility_beta.outputs.latest_version }}"
          LATEST_PRERELEASE="${{ steps.check_wootility_beta.outputs.latest_prerelease }}"
          sed -i "s/^%global upstream_version .*/%global upstream_version $LATEST_VERSION/" wootility-beta/wootility-beta.spec
          sed -i "s/^%global prerelease\s\+.*/%global prerelease       $LATEST_PRERELEASE/" wootility-beta/wootility-beta.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - ${LATEST_VERSION}~${LATEST_PRERELEASE}-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to beta ${LATEST_VERSION}-${LATEST_PRERELEASE}" wootility-beta/wootility-beta.spec

      - name: Commit Wootility beta changes
        if: steps.check_wootility_beta.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wootility-beta/wootility-beta.spec
          git commit -m "chore(wootility-beta): update to beta ${{ steps.check_wootility_beta.outputs.latest }}"

      # ============================================
      # AmneziaWG DKMS
      # ============================================
      - name: Check for new AmneziaWG DKMS version
        id: check_dkms
        run: |
          CURRENT_COMMIT=$(grep -oP '^%global commit \K[a-f0-9]+' amneziawg-dkms/amneziawg-dkms.spec)
          LATEST_COMMIT=$(curl -s https://api.github.com/repos/amnezia-vpn/amneziawg-linux-kernel-module/commits | jq -r '.[0].sha')
          LATEST_SHORT=$(echo $LATEST_COMMIT | cut -c1-7)
          COMMIT_DATE=$(date '+%Y%m%d')
          echo "current=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          echo "short=$LATEST_SHORT" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update AmneziaWG DKMS spec
        if: steps.check_dkms.outputs.update_needed == 'true'
        run: |
          COMMIT="${{ steps.check_dkms.outputs.latest }}"
          SHORT="${{ steps.check_dkms.outputs.short }}"
          DATE="${{ steps.check_dkms.outputs.date }}"
          sed -i "s/^%global commit .*/%global commit $COMMIT/" amneziawg-dkms/amneziawg-dkms.spec
          sed -i "s/^%global commitdate .*/%global commitdate $DATE/" amneziawg-dkms/amneziawg-dkms.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - 1:1.0.${DATE}git${SHORT}-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to git commit $SHORT" amneziawg-dkms/amneziawg-dkms.spec

      - name: Commit AmneziaWG DKMS changes
        if: steps.check_dkms.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amneziawg-dkms/amneziawg-dkms.spec
          git commit -m "chore(amneziawg-dkms): update to commit ${{ steps.check_dkms.outputs.short }}"

      # ============================================
      # AmneziaWG Tools
      # ============================================
      - name: Check for new AmneziaWG Tools version
        id: check_tools
        run: |
          CURRENT_COMMIT=$(grep -oP '^%global commit \K[a-f0-9]+' amneziawg-tools/amneziawg-tools.spec)
          LATEST_COMMIT=$(curl -s https://api.github.com/repos/amnezia-vpn/amneziawg-tools/commits | jq -r '.[0].sha')
          LATEST_SHORT=$(echo $LATEST_COMMIT | cut -c1-7)
          COMMIT_DATE=$(date '+%Y%m%d')
          echo "current=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          echo "short=$LATEST_SHORT" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update AmneziaWG Tools spec
        if: steps.check_tools.outputs.update_needed == 'true'
        run: |
          COMMIT="${{ steps.check_tools.outputs.latest }}"
          SHORT="${{ steps.check_tools.outputs.short }}"
          DATE="${{ steps.check_tools.outputs.date }}"
          sed -i "s/^%global commit .*/%global commit $COMMIT/" amneziawg-tools/amneziawg-tools.spec
          sed -i "s/^%global commitdate .*/%global commitdate $DATE/" amneziawg-tools/amneziawg-tools.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - 1.0.${DATE}git${SHORT}-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to git commit $SHORT" amneziawg-tools/amneziawg-tools.spec

      - name: Commit AmneziaWG Tools changes
        if: steps.check_tools.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amneziawg-tools/amneziawg-tools.spec
          git commit -m "chore(amneziawg-tools): update to commit ${{ steps.check_tools.outputs.short }}"

      # ============================================
      # Mesa
      # ============================================
      - name: Check for new Mesa version
        id: check_mesa
        run: |
          CURRENT_COMMIT=$(grep -oP '^%define commit \K[a-f0-9]+' mesa-git/mesa.spec)
          CURRENT_VERSION=$(grep -oP '^%define version_string \K[0-9.]+' mesa-git/mesa.spec)
          LATEST_COMMIT=$(curl -s "https://gitlab.freedesktop.org/api/v4/projects/mesa%2Fmesa/repository/commits" | jq -r '.[0].id')
          LATEST_SHORT=$(echo $LATEST_COMMIT | cut -c1-7)
          COMMIT_DATE=$(date '+%Y%m%d.%H')
          # Fetch the VERSION file at the latest commit to get the real upstream version
          LATEST_VERSION=$(curl -s "https://gitlab.freedesktop.org/api/v4/projects/mesa%2Fmesa/repository/files/VERSION/raw?ref=${LATEST_COMMIT}" | tr -d '[:space:]' | sed 's/-devel//')
          if [ -z "$LATEST_VERSION" ] || [ -z "$LATEST_COMMIT" ]; then
            echo "Failed to fetch Mesa version info"
            exit 1
          fi
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          echo "short=$LATEST_SHORT" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ] || [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Mesa spec
        if: steps.check_mesa.outputs.update_needed == 'true'
        run: |
          COMMIT="${{ steps.check_mesa.outputs.latest }}"
          SHORT="${{ steps.check_mesa.outputs.short }}"
          DATE="${{ steps.check_mesa.outputs.date }}"
          LATEST_VERSION="${{ steps.check_mesa.outputs.latest_version }}"
          sed -i "s/^%define commit .*/%define commit $COMMIT/" mesa-git/mesa.spec
          sed -i "s/^%global commit_date .*/%global commit_date $DATE/" mesa-git/mesa.spec
          sed -i "s/^%define version_string .*/%define version_string $LATEST_VERSION/" mesa-git/mesa.spec
          CURRENT_RELEASE=$(grep -oP '^Release:\s+0\.\K[0-9]+' mesa-git/mesa.spec)
          NEW_RELEASE=$((CURRENT_RELEASE + 1))
          sed -i "s/^Release:\s\+0\.[0-9]\+%/Release:        0.$NEW_RELEASE%/" mesa-git/mesa.spec

      - name: Commit Mesa changes
        if: steps.check_mesa.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mesa-git/mesa.spec
          git commit -m "chore(mesa-git): update to ${{ steps.check_mesa.outputs.latest_version }} commit ${{ steps.check_mesa.outputs.short }}"

      # ============================================
      # scx-scheds (sched-ext schedulers)
      # ============================================
      - name: Check for new scx-scheds version
        id: check_scx_scheds
        run: |
          CURRENT_VERSION=$(grep -oP '^Version:\s*\K[0-9.]+' scx-scheds/scx-scheds.spec)
          TAG_NAME=$(curl -fsSL https://api.github.com/repos/sched-ext/scx/releases/latest | jq -r '.tag_name')
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "Failed to determine latest scx release tag"
            exit 1
          fi
          LATEST_VERSION="${TAG_NAME#v}"
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update scx-scheds spec
        if: steps.check_scx_scheds.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.check_scx_scheds.outputs.latest }}"
          sed -i "s/^Version:\s*.*/Version:        $LATEST_VERSION/" scx-scheds/scx-scheds.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - $LATEST_VERSION-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to version $LATEST_VERSION" scx-scheds/scx-scheds.spec

      - name: Commit scx-scheds changes
        if: steps.check_scx_scheds.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scx-scheds/scx-scheds.spec
          git commit -m "chore(scx-scheds): update to version ${{ steps.check_scx_scheds.outputs.latest }}"

      # ============================================
      # scx-tools (scx_loader / scxctl)
      # ============================================
      - name: Check for new scx-tools version
        id: check_scx_tools
        run: |
          CURRENT_VERSION=$(grep -oP '^Version:\s*\K[0-9.]+' scx-tools/scx-tools.spec)
          TAG_NAME=$(curl -fsSL https://api.github.com/repos/sched-ext/scx-loader/tags | jq -r '.[0].name')
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "Failed to determine latest scx-loader tag"
            exit 1
          fi
          LATEST_VERSION="${TAG_NAME#v}"
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update scx-tools spec
        if: steps.check_scx_tools.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.check_scx_tools.outputs.latest }}"
          sed -i "s/^Version:\s*.*/Version:        $LATEST_VERSION/" scx-tools/scx-tools.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - $LATEST_VERSION-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to version $LATEST_VERSION" scx-tools/scx-tools.spec

      - name: Commit scx-tools changes
        if: steps.check_scx_tools.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scx-tools/scx-tools.spec
          git commit -m "chore(scx-tools): update to version ${{ steps.check_scx_tools.outputs.latest }}"

      # ============================================
      # scx-manager (CachyOS Qt GUI)
      # ============================================
      - name: Check for new scx-manager version
        id: check_scx_manager
        run: |
          CURRENT_VERSION=$(grep -oP '^Version:\s*\K[0-9.]+' scx-manager/scx-manager.spec)
          TAG_NAME=$(curl -fsSL https://api.github.com/repos/CachyOS/scx-manager/tags | jq -r '.[0].name')
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "Failed to determine latest scx-manager tag"
            exit 1
          fi
          LATEST_VERSION="${TAG_NAME#v}"
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update scx-manager spec
        if: steps.check_scx_manager.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.check_scx_manager.outputs.latest }}"
          sed -i "s/^Version:\s*.*/Version:        $LATEST_VERSION/" scx-manager/scx-manager.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - $LATEST_VERSION-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to version $LATEST_VERSION" scx-manager/scx-manager.spec

      - name: Commit scx-manager changes
        if: steps.check_scx_manager.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scx-manager/scx-manager.spec
          git commit -m "chore(scx-manager): update to version ${{ steps.check_scx_manager.outputs.latest }}"

      # ============================================
      # claude-desktop
      # ============================================
      - name: Check for new Claude Desktop version
        id: check_claude_desktop
        run: |
          CURRENT_VERSION=$(grep -oP '^%global claude_version \K\S+' claude-desktop/claude-desktop.spec)
          LATEST_VERSION=$(curl -fsSL 'https://downloads.claude.ai/releases/win32/arm64/RELEASES' \
              | grep -oE 'AnthropicClaude-[0-9.]+-full\.nupkg' \
              | sed -E 's/AnthropicClaude-([0-9.]+)-full\.nupkg/\1/' \
              | sort -V | tail -1)
          if [ -z "$LATEST_VERSION" ]; then
            echo "Failed to determine latest Claude Desktop version"
            exit 1
          fi
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Claude Desktop spec
        if: steps.check_claude_desktop.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.check_claude_desktop.outputs.latest }}"
          sed -i "s/^%global claude_version .*/%global claude_version $LATEST_VERSION/" claude-desktop/claude-desktop.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - $LATEST_VERSION-1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to Claude Desktop $LATEST_VERSION" claude-desktop/claude-desktop.spec

      - name: Commit Claude Desktop changes
        if: steps.check_claude_desktop.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude-desktop/claude-desktop.spec
          git commit -m "chore(claude-desktop): update to ${{ steps.check_claude_desktop.outputs.latest }}"

      # ============================================
      # kernel-cachyos
      # ============================================
      - name: Check for new CachyOS kernel tag
        id: check_kernel_cachyos
        run: |
          CURRENT_BASE=$(grep -oP '^%define _upstream_base\s+\K\S+' kernel-cachyos/kernel-cachyos.spec)
          CURRENT_STABLE=$(grep -oP '^%define _upstream_stable\s+\K\d+' kernel-cachyos/kernel-cachyos.spec)
          CURRENT_REL=$(grep -oP '^%define _upstream_rel\s+\K\d+' kernel-cachyos/kernel-cachyos.spec)
          CURRENT_TAG="${CURRENT_BASE}.${CURRENT_STABLE}-${CURRENT_REL}"

          # Pick the newest stable cachyos-X.Y.Z-N tag (skip -rcN).
          LATEST_TAG=$(curl -fsSL 'https://api.github.com/repos/CachyOS/linux/git/matching-refs/tags/cachyos-' \
              | jq -r '.[].ref' \
              | sed 's|refs/tags/cachyos-||' \
              | grep -vE -- '-rc[0-9]' \
              | sort -V \
              | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "Failed to determine latest CachyOS kernel tag"
            exit 1
          fi

          # Tag format: X.Y.Z-N
          LATEST_VERSION="${LATEST_TAG%-*}"
          LATEST_REL="${LATEST_TAG##*-}"
          LATEST_BASE="${LATEST_VERSION%.*}"
          LATEST_STABLE="${LATEST_VERSION##*.}"

          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "latest_base=$LATEST_BASE" >> $GITHUB_OUTPUT
          echo "latest_stable=$LATEST_STABLE" >> $GITHUB_OUTPUT
          echo "latest_rel=$LATEST_REL" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_TAG" != "$LATEST_TAG" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update CachyOS kernel spec
        if: steps.check_kernel_cachyos.outputs.update_needed == 'true'
        run: |
          BASE="${{ steps.check_kernel_cachyos.outputs.latest_base }}"
          STABLE="${{ steps.check_kernel_cachyos.outputs.latest_stable }}"
          REL="${{ steps.check_kernel_cachyos.outputs.latest_rel }}"
          VERSION="${{ steps.check_kernel_cachyos.outputs.latest_version }}"
          TAG="${{ steps.check_kernel_cachyos.outputs.latest_tag }}"
          sed -i "s/^%define _upstream_base .*/%define _upstream_base   $BASE/" kernel-cachyos/kernel-cachyos.spec
          sed -i "s/^%define _upstream_stable .*/%define _upstream_stable $STABLE/" kernel-cachyos/kernel-cachyos.spec
          sed -i "s/^%define _upstream_rel .*/%define _upstream_rel    $REL/" kernel-cachyos/kernel-cachyos.spec
          sed -i "s/^%define _pkgrel .*/%define _pkgrel 1/" kernel-cachyos/kernel-cachyos.spec
          CURRENT_DATE=$(date '+%a %b %d %Y')
          CHANGELOG_ENTRY="* $CURRENT_DATE Automated Update <github-actions@github.com> - ${VERSION}-cachyos1"
          sed -i "/^%changelog/a $CHANGELOG_ENTRY\n- Update to CachyOS $TAG" kernel-cachyos/kernel-cachyos.spec

      - name: Commit CachyOS kernel changes
        if: steps.check_kernel_cachyos.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kernel-cachyos/kernel-cachyos.spec
          git commit -m "chore(kernel-cachyos): update to CachyOS ${{ steps.check_kernel_cachyos.outputs.latest_tag }}"

      # ============================================
      # Push all changes at once
      # ============================================
      - name: Push all changes
        run: |
          git push || echo "No changes to push"
